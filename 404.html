<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="not-found-page">
        <div class="container not-found-grid">
            <div class="not-found-copy">
                <span class="section-kicker">404 error</span>
                <h1>This page is offline.</h1>
                <p>The link may be broken, moved, or still waiting for DNS to point in the right direction. Let us get you back to a live Stackly page.</p>
                <div class="not-found-actions">
                    <a href="index.html" class="btn-primary btn-lg">Back to Home</a>
                    <button type="button" class="btn-outline btn-lg" onclick="history.back()">Go Back</button>
                </div>
            </div>
            <div class="not-found-card" aria-label="Hosting status preview">
                <div class="dashboard-window-bar">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <strong>404</strong>
                <h2>Route not found</h2>
                <p>Server online. Requested page unavailable.</p>
                <div class="not-found-status">
                    <span>DNS</span>
                    <em>Healthy</em>
                </div>
                <div class="not-found-status">
                    <span>SSL</span>
                    <em>Active</em>
                </div>
                <div class="not-found-status">
                    <span>Support</span>
                    <em>Ready</em>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
